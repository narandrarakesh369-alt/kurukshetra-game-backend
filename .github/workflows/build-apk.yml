name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies and build Web App
      working-directory: ./client
      run: |
        npm install --no-package-lock
        npm run build

    - name: Sync Capacitor Android
      working-directory: ./client
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android --no-package-lock
        npx cap sync android

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Make gradlew executable
      working-directory: ./client/android
      run: chmod +x gradlew

    - name: Build Debug APK
      working-directory: ./client/android
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Kurukshetra-Game-APK
        path: client/android/app/build/outputs/apk/debug/app-debug.apk
